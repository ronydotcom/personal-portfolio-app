{% extends "master/base.html" %}

{% load crispy_forms_tags %}

{% block content %}

<h1>{{form_title}}</h1>
<form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{form_data|crispy}}

    <button type="submit" class="btn btn-primary">{{form_btn}}</button>
</form>


{% endblock content %}
